                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">eco</span>
                    Veg Buffet Menu
                </button>
                <button id="btn-nonveg-tab" class="flex items-center gap-2.5 px-8 py-3.5 rounded-full font-label-bold text-label-bold transition-all duration-300 text-on-surface-variant hover:text-primary dark:text-outline-variant dark:hover:text-primary-fixed" onclick="switchMenu('nonveg')">

<!-- Veg Buffet Menu Content -->

            <!-- Dynamically populated -->
        </div>

        <!-- Non-Veg Buffet Menu Content -->
        <div id="nonveg-menu-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-500 opacity-100 transform translate-y-0 hidden">
            <!-- Dynamically populated -->
        </div>

<script>
    function switchMenu(type) {
        const vegTab = document.getElementById('btn-veg-tab');
        const nonvegTab = document.getElementById('btn-nonveg-tab');
        const vegContent = document.getElementById('veg-menu-content');
        const nonvegContent = document.getElementById('nonveg-menu-content');
        
        if (type === 'veg') {
            vegTab.className = "flex items-center gap-2.5 px-8 py-3.5 rounded-full font-label-bold text-label-bold transition-all duration-300 bg-tertiary text-on-tertiary shadow-md";
            nonvegTab.className = "flex items-center gap-2.5 px-8 py-3.5 rounded-full font-label-bold text-label-bold transition-all duration-300 text-on-surface-variant hover:text-primary dark:text-outline-variant dark:hover:text-primary-fixed";
            
            vegContent.classList.remove('hidden');
            nonvegContent.classList.add('hidden');
        } else {
            vegTab.className = "flex items-center gap-2.5 px-8 py-3.5 rounded-full font-label-bold text-label-bold transition-all duration-300 text-on-surface-variant hover:text-tertiary dark:text-outline-variant dark:hover:text-tertiary-fixed-dim";
            nonvegTab.className = "flex items-center gap-2.5 px-8 py-3.5 rounded-full font-label-bold text-label-bold transition-all duration-300 bg-primary text-on-primary shadow-md";
            
            vegContent.classList.add('hidden');
            nonvegContent.classList.remove('hidden');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderMenu();
    });

    function renderMenu() {
        const db = window.getMenuDatabase();
        
        const vegContent = document.getElementById('veg-menu-content');
        const nonvegContent = document.getElementById('nonveg-menu-content');
        
        if (vegContent) {
            vegContent.innerHTML = '';
            db.veg.forEach(cat => {
                if (cat.items.length === 0) return;
                
                const card = document.createElement('div');
                card.className = "glass-panel rounded-2xl p-6 border border-tertiary-fixed-dim/20 shadow-sm hover:shadow-md hover:scale-[1.01] transition-all duration-300 flex flex-col gap-4";
                
                let itemsListHTML = cat.items.map(item => `
                    <li class="font-body-md text-on-surface-variant flex items-start gap-2.5">
                        <span class="material-symbols-outlined text-tertiary text-[18px] mt-0.5" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        <span>${item.name}</span>
                    </li>
                `).join('');
                
                card.innerHTML = `
                    <div class="flex justify-between items-center pb-3 border-b border-outline-variant/20">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-tertiary text-2xl">${cat.icon || 'restaurant'}</span>
                            <h3 class="font-headline-sm text-lg text-on-surface font-semibold">${cat.category}</h3>
                        </div>
                        <span class="border border-tertiary p-0.5 flex items-center justify-center rounded-sm w-4 h-4" title="Vegetarian">
                            <span class="bg-tertiary rounded-full w-2 h-2"></span>
                        </span>
                    </div>
                    <ul class="space-y-3">
                        ${itemsListHTML}
                    </ul>
                `;
                vegContent.appendChild(card);
            });
        }
        
        if (nonvegContent) {
            nonvegContent.innerHTML = '';
            db.nonveg.forEach(cat => {
                if (cat.items.length === 0) return;
                
                const card = document.createElement('div');
                card.className = "glass-panel rounded-2xl p-6 border border-primary-fixed-dim/20 shadow-sm hover:shadow-md hover:scale-[1.01] transition-all duration-300 flex flex-col gap-4";
                
                let itemsListHTML = cat.items.map(item => `
                    <li class="font-body-md text-on-surface-variant flex items-start gap-2.5">
                        <span class="material-symbols-outlined text-primary text-[18px] mt-0.5" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        <span>${item.name}</span>
                    </li>
                `).join('');
                
                card.innerHTML = `
                    <div class="flex justify-between items-center pb-3 border-b border-outline-variant/20">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-2xl">${cat.icon || 'restaurant'}</span>
                            <h3 class="font-headline-sm text-lg text-on-surface font-semibold">${cat.category}</h3>
                        </div>
                        <span class="border border-primary p-0.5 flex items-center justify-center rounded-sm w-4 h-4" title="Non-Vegetarian">
                            <span class="bg-primary rounded-full w-2 h-2"></span>
                        </span>
                    </div>
                    <ul class="space-y-3">
                        ${itemsListHTML}
                    </ul>
                `;
                nonvegContent.appendChild(card);
            });
        }
    }
</script>
